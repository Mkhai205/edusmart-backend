services:
    # 1. Database: PostgreSQL tích hợp sẵn pgvector
    db:
        image: pgvector/pgvector:pg16-trixie
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
            POSTGRES_DB: ${POSTGRES_DB:-edusmart_db}
        ports:
            - "5432:5432"
        volumes:
            - edusmart_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-edusmart_db}",
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    # 2. Storage: MinIO
    minio:
        image: minio/minio:RELEASE.2025-09-07T16-13-09Z
        restart: always
        command: server /data --console-address ":9001"
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-admin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-admin123456}
        ports:
            - "9000:9000" # Port cho API gọi
            - "9001:9001" # Port cho giao diện Web Admin
        volumes:
            - edusmart_minio_data:/data
        healthcheck:
            test: ["CMD", "mc", "ready", "local"]
            interval: 5s
            timeout: 5s
            retries: 5

volumes:
    edusmart_postgres_data:
    edusmart_minio_data:
