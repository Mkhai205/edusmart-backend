[project]
name = "edusmart-backend"
version = "0.1.0"
description = ""
authors = [
    {name = "MKhai205",email = "manhkhai123459876@gmail.com"}
]
requires-python = ">=3.13,<3.14"
dependencies = [
    "fastapi (>=0.135.1,<0.136.0)",
    "uvicorn (>=0.42.0,<0.43.0)",
    "sqlalchemy (>=2.0.48,<3.0.0)",
    "asyncpg (>=0.31.0,<0.32.0)",
    "python-jose[cryptography] (>=3.5.0,<4.0.0)",
    "httpx (>=0.28.1,<0.29.0)",
    "google-auth (>=2.41.1,<3.0.0)",
    "email-validator (>=2.3.0,<3.0.0)",
    "python-multipart (>=0.0.20,<0.0.21)",
    "pydantic-settings (>=2.13.1,<3.0.0)",
    "minio (>=7.2.18,<8.0.0)",
    "langchain-google-genai (>=4.2.1,<5.0.0)",
    "pgvector (>=0.3.6,<0.4.0)",
    "psycopg[binary] (>=3.3.3,<4.0.0)",
    "pymupdf (>=1.26.4,<2.0.0)"
]

[tool.poetry]
package-mode = false


